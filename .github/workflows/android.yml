name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew test

    - name: Build Debug APK and Test APK
      run: ./gradlew assembleDebug assembleDebugAndroidTest

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    # Firebase Test Lab (Requires FIREBASE_SERVICE_ACCOUNT secret)
    # This step is prepared but will only run if the secret is provided.
    - name: Run UI Tests on Firebase Test Lab
      if: env.HAS_SECRET == 'true'
      uses: asyrosse/firebase-test-lab-action@v1.2
      with:
        arg-package: "app/build/outputs/apk/debug/app-debug.apk"
        arg-test: "app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"
      env:
        SERVICE_ACCOUNT_ADDRESS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        HAS_SECRET: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
